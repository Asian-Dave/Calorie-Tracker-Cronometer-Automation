services:
  calorie-tracker:
    build: .
    stdin_open: true
    tty: true
    shm_size: "256m"
    environment:
      - PYTHONUNBUFFERED=1
      # Credentials are injected at runtime by add_meal.sh from the host keychain.
      # Never stored in the image or committed to the repo.
      - CRONOMETER_USER
      - CRONOMETER_PASSWORD
    volumes:
      # Mount the project so the script and session cache are shared with the host.
      - .:/app
